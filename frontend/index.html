<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">EventHub</div>
        <nav>
            <a href="#" id="nav-events">Events</a>
            <a href="#" id="nav-dashboard" style="display: none;">Dashboard</a>
            <a href="#" id="nav-login">Login</a>
            <a href="#" id="nav-register">Register</a>
            <a href="#" id="nav-logout" style="display: none;">Logout</a>
        </nav>
    </header>

    <main>
        <!-- Events Section -->
        <section id="events-section">
            <div class="section-header">
                <h2>Upcoming Events</h2>
                <button id="btn-create-event" style="display: none;">Create Event</button>
            </div>
            <div id="events-list" class="events-grid">
                <!-- Events will be populated here -->
            </div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" style="display: none;">
            <div class="section-header">
                <h2>My Dashboard</h2>
            </div>
            
            <h3 style="margin-bottom: 1rem;">Events I'm Organizing</h3>
            <div id="organized-events-list" class="events-grid" style="margin-bottom: 2rem;">
                <!-- Organized Events will be populated here -->
            </div>

            <h3 style="margin-bottom: 1rem;">Events I'm Attending</h3>
            <div id="attending-events-list" class="events-grid">
                <!-- Attending Events will be populated here -->
            </div>
        </section>

        <!-- Login Section -->
        <section id="login-section" style="display: none;">
            <div class="form-container">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
            </div>
        </section>

        <!-- Register Section -->
        <section id="register-section" style="display: none;">
            <div class="form-container">
                <h2>Register</h2>
                <form id="register-form">
                    <input type="text" id="register-name" placeholder="Full Name" required>
                    <input type="email" id="register-email" placeholder="Email" required>
                    <input type="password" id="register-password" placeholder="Password" required>
                    <button type="submit">Register</button>
                </form>
            </div>
        </section>

        <!-- Create Event Modal -->
        <div id="create-event-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Create New Event</h2>
                <form id="create-event-form">
                    <input type="text" id="event-title" placeholder="Event Title" required>
                    <textarea id="event-desc" placeholder="Event Description" required></textarea>
                    <input type="datetime-local" id="event-date" required>
                    <input type="text" id="event-location" placeholder="Location" required>
                    <button type="submit">Create Event</button>
                </form>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
